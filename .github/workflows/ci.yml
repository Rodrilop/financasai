name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pytest with verbose output
        env:
          JWT_SECRET_KEY: "mock_jwt_secret_for_ci_testing"
          GEMINI_API_KEY: "mock_gemini_api_key_for_ci_testing"
          TURSO_DATABASE_URL: "sqlite:///:memory:"
          TURSO_AUTH_TOKEN: ""
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          python -m pytest tests/ -v --tb=short
      
      - name: Run tests with coverage
        env:
          JWT_SECRET_KEY: "mock_jwt_secret_for_ci_testing"
          GEMINI_API_KEY: "mock_gemini_api_key_for_ci_testing"
          TURSO_DATABASE_URL: "sqlite:///:memory:"
          TURSO_AUTH_TOKEN: ""
        run: |
          cd backend
          export PYTHONPATH=$PYTHONPATH:.
          pip install pytest-cov
          python -m pytest tests/ --cov=. --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js 20 (LTS - compatible with all dependencies)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run Vitest
        run: |
          cd frontend
          npm run test -- --run --reporter=verbose
      
      - name: Run Vitest with coverage
        run: |
          cd frontend
          npm run test -- --run --coverage --reporter=verbose

  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: financasai-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
